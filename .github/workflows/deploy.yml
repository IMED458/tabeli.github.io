name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: tabeli.imed.com.ge
      - name: Deploy Firestore Rules
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        run: npx firebase-tools@latest deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" --project tabeli-18c3b --non-interactive
